<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>8月ゼミ 進捗ダッシュボード</title>
<style>
  :root{
    --bg:#f7f8fb; --card:#ffffff; --muted:#6b7280; --accent:#2563eb;
    --good:#16a34a; --bad:#ef4444;
  }
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;background:var(--bg);margin:0;padding:24px;color:#111}
  .wrap{max-width:980px;margin:0 auto}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  h1{font-size:18px;margin:0}
  .meta{color:var(--muted);font-size:13px}
  .card{background:var(--card);padding:16px;border-radius:10px;box-shadow:0 1px 2px rgba(16,24,40,0.04);margin-bottom:12px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:8px 10px;text-align:left;border-bottom:1px solid #eef2f7}
  th{font-weight:600;color:var(--muted);font-size:13px}
  .badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;background:#eef2ff;color:var(--accent)}
  .progress{height:10px;background:#eef2f7;border-radius:999px;overflow:hidden}
  .bar{height:100%;background:linear-gradient(90deg,var(--accent),#60a5fa);width:0%}
  .small{font-size:13px;color:var(--muted)}
  .center{display:flex;gap:8px;align-items:center}
  .rate-pos{color:var(--good);font-weight:600}
  .rate-neg{color:var(--bad);font-weight:600}
  .refresh{font-size:13px;color:var(--muted);cursor:pointer;border:1px dashed #e6eefc;padding:6px 10px;border-radius:8px;background:#fff}
  @media (max-width:640px){
    th,td{padding:8px 6px;font-size:13px}
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>8月ゼミ 進捗ダッシュボード</h1>
        <div class="meta" id="meta">読み込み中…</div>
      </div>
      <div class="center">
        <button class="refresh" id="btnRefresh">今すぐ更新</button>
      </div>
    </header>

    <div class="card">
      <table id="tbl">
        <thead>
          <tr>
            <th>回</th>
            <th>日付</th>
            <th>実施</th>
            <th>参加 / 想定</th>
            <th>完了率</th>
            <th>遷移率</th>
            <th>メモ</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="7" class="small">データを読み込んでいます…</td></tr>
        </tbody>
      </table>
    </div>

    <div class="card small" id="summary">集計を読み込んでいます…</div>
  </div>

<script>
(async function(){
  const DATA_PATH = './data/progress.json';
  const REFRESH_INTERVAL = 60000; // 60秒
  const tbody = document.getElementById('tbody');
  const meta = document.getElementById('meta');
  const summary = document.getElementById('summary');
  const btn = document.getElementById('btnRefresh');

  btn.addEventListener('click', ()=> load(true));

  async function fetchJson(nocache=false){
    const url = DATA_PATH + (nocache ? ('?t=' + Date.now()) : '');
    const res = await fetch(url, {cache: 'no-store'});
    if(!res.ok) throw new Error('データ取得失敗: ' + res.status);
    return res.json();
  }

  function fmtPct(v){
    if (v === null || v === undefined) return '-';
    return (v*100).toFixed(0) + '%';
  }

  function fmtSignedPct(v){
    if (v === null || v === undefined) return '-';
    const p = (v*100).toFixed(0);
    return (v>0? '+' : '') + p + '%';
  }

  function renderRows(data){
    tbody.innerHTML = '';
    const sessions = data.sessions || [];
    sessions.forEach((s, i) => {
      const tr = document.createElement('tr');

      // 回番号
      const tdNum = document.createElement('td');
      tdNum.textContent = s.sessionNumber ?? (i+1);
      tr.appendChild(tdNum);

      // 日付
      const tdDate = document.createElement('td');
      tdDate.textContent = s.date || '-';
      tr.appendChild(tdDate);

      // 実施チェック
      const tdChecked = document.createElement('td');
      tdChecked.innerHTML = s.checked ? '<span class="badge">実施済</span>' : '<span class="small">未実施</span>';
      tr.appendChild(tdChecked);

      // 参加 / 想定
      const tdAtt = document.createElement('td');
      tdAtt.textContent = (s.attendees ?? '-') + ' / ' + (s.expectedAttendees ?? '-');
      tr.appendChild(tdAtt);

      // 完了率（バー）
      const tdComp = document.createElement('td');
      const pWrap = document.createElement('div');
      pWrap.style.display = 'flex';
      pWrap.style.flexDirection = 'column';
      pWrap.style.gap = '6px';
      const prog = document.createElement('div');
      prog.className = 'progress';
      const bar = document.createElement('div');
      bar.className = 'bar';
      const pct = (typeof s.completionRate === 'number') ? Math.max(0, Math.min(100, s.completionRate*100)) : 0;
      bar.style.width = pct + '%';
      prog.appendChild(bar);
      const label = document.createElement('div');
      label.className = 'small';
      label.textContent = fmtPct(s.completionRate);
      pWrap.appendChild(prog);
      pWrap.appendChild(label);
      tdComp.appendChild(pWrap);
      tr.appendChild(tdComp);

      // 遷移率
      const tdTrans = document.createElement('td');
      const trRate = s.transitionRate;
      if (typeof trRate === 'number') {
        const span = document.createElement('span');
        span.textContent = fmtSignedPct(trRate);
        span.className = trRate >= 0 ? 'rate-pos' : 'rate-neg';
        tdTrans.appendChild(span);
      } else {
        tdTrans.textContent = '-';
      }
      tr.appendChild(tdTrans);

      // メモ
      const tdNote = document.createElement('td');
      tdNote.textContent = s.notes || '';
      tr.appendChild(tdNote);

      tbody.appendChild(tr);
    });
  }

  function renderSummary(data){
    const total = data.totalSessions ?? (data.sessions ? data.sessions.length : 0);
    const done = (data.sessions || []).filter(s => s.checked).length;
    const avgCompletion = (() => {
      const arr = (data.sessions || []).map(s => s.completionRate).filter(x => typeof x === 'number');
      if (!arr.length) return null;
      return arr.reduce((a,b)=>a+b,0)/arr.length;
    })();
    summary.innerHTML = `<strong>合計回数</strong> ${total}　　<strong>実施済</strong> ${done}　　<strong>平均完了率</strong> ${avgCompletion===null?'-':(avgCompletion*100).toFixed(0)+'%'}`;
  }

  async function load(force=false){
    try{
      meta.textContent = '最終更新: 読み込み中…';
      const data = await fetchJson(force);
      const t = new Date(data.generatedAt || Date.now());
      meta.textContent = 'データ生成: ' + t.toLocaleString();
      renderRows(data);
      renderSummary(data);
    }catch(err){
      meta.textContent = 'データ取得エラー';
      tbody.innerHTML = `<tr><td colspan="7" class="small">エラー: ${err.message}</td></tr>`;
      summary.textContent = 'データを読み込めませんでした。';
      console.error(err);
    }
  }

  // 初回ロード（キャッシュ回避）
  await load(true);

  // 定期更新（キャッシュ回避）
  setInterval(()=> load(true), REFRESH_INTERVAL);

})();
</script>
</body>
</html>
